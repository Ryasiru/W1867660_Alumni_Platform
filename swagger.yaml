openapi: 3.0.0
info:
  title: Alumni Influencer Platform API
  description: API for alumni bidding and profile management
  version: 1.0.0

servers:
  - url: http://localhost:3000/api

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    clientIdAuth:
      type: apiKey
      in: header
      name: X-Client-ID

paths:
  /auth/register:
    post:
      summary: Register new alumni
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, firstName, lastName]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password, minLength: 8 }
                firstName: { type: string }
                lastName: { type: string }
      responses:
        '201': { description: Registration successful }
        '400': { description: Validation error }

  /auth/login:
    post:
      summary: Login user
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
      responses:
        '200': { description: Login successful }
        '401': { description: Invalid credentials }
        '403': { description: Email not verified }

  /profiles/me:
    get:
      summary: Get current user profile
      security: [{ bearerAuth: [] }]
      tags: [Profiles]
      responses:
        '200': { description: Profile retrieved }
        '401': { description: Unauthorized }

  /bids:
    post:
      summary: Place a bid
      security: [{ bearerAuth: [] }]
      tags: [Bids]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, bidForDate]
              properties:
                amount: { type: number, minimum: 0 }
                bidForDate: { type: string, format: date }
      responses:
        '200': { description: Bid placed }
        '400': { description: Invalid bid }

  /public/featured-alumni:
    get:
      summary: Get today's featured alumni
      security: [{ apiKeyAuth: [], clientIdAuth: [] }]
      tags: [Public]
      responses:
        '200': { description: Featured alumni retrieved }
        '404': { description: No featured alumni today }
        '401': { description: Invalid API key }